name: iOS (Simulator build)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.*"
      - "vite.config.*"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Build web + sync iOS
        run: |
          npm run build
          npx cap sync ios

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Pod install
        working-directory: ios/App
        run: pod install

      - name: Xcode build (simulator)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive app bundle
        run: |
          mkdir -p artifacts
          APP_PATH="$(find ios/App/build -type d -name 'App.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "App.app not found under derived data."
            find ios/App/build -maxdepth 4 -type d | sed -n '1,200p'
            exit 1
          fi
          ditto "$APP_PATH" "artifacts/App.app"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-App.app
          path: artifacts/App.app
